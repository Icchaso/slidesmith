<div class="slide">
  <div class="head">
    <div class="kicker">ONE NIGHT</div>
    <h2>夕刻から、<em>静寂</em>へ</h2>
    <p class="lead">着いてから発つまで、急かすものは何もありません。一夜は、ゆっくりと更けていきます。</p>
  </div>
  <div class="timeline">
    <div class="tl-nodes" style="--cols: 4;">
      <div class="tl-node">
        <div class="when">15:00</div><div class="dot"></div>
        <h3>到着</h3>
        <p>石畳を渡り、離れへ。迎えの一服と季の上生菓子を。</p>
      </div>
      <div class="tl-node">
        <div class="when">16:00</div><div class="dot"></div>
        <h3>湯浴み</h3>
        <p>日のあるうちに、源泉かけ流しの露天へ。</p>
      </div>
      <div class="tl-node">
        <div class="when">18:30</div><div class="dot"></div>
        <h3>囲炉裏会席</h3>
        <p>山の幸の会席を、離れにて。酒は地のものを少し。</p>
      </div>
      <div class="tl-node">
        <div class="when">21:00</div><div class="dot"></div>
        <h3>静寂</h3>
        <p>灯りを落とし、虫の音だけ。何もしない夜へ。</p>
      </div>
    </div>
  </div>
  <div class="brand"><span class="mark"></span>HANARE NO YADO</div>
  <div class="pageno">04</div>
</div>
