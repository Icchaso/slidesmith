<link rel="stylesheet" href="../../core/base.css">
<link rel="stylesheet" href="../../themes/warm.css">
<div class="slide">
  <div class="deco layer-texture"></div>
  <div class="head">
    <div class="kicker">OUR PROMISE</div>
    <h2>一杯が届くまでの<em>3つのこだわり</em></h2>
    <p class="lead">素材選びから提供まで。コモレビ堂の「丁寧」は、この流れの中にあります。</p>
  </div>
  <div class="steps" style="--cols: 3;">
    <div class="step">
      <div class="badge">1</div>
      <h3>畑から直接仕入れ</h3>
      <p>提携する近郊の農家さん5軒から、朝採れの旬の野菜と果物だけを受け取ります。</p>
      <div class="note">毎朝7時に入荷</div>
    </div>
    <div class="step">
      <div class="badge">2</div>
      <h3>店内で自家焙煎</h3>
      <p>珈琲豆は週2回、店の小さな焙煎機で。香りが一番ひらく「焙煎後3日目」で提供します。</p>
      <div class="note">火・金が焙煎日</div>
    </div>
    <div class="step">
      <div class="badge">3</div>
      <h3>一杯ずつ手淹れ</h3>
      <p>注文をいただいてから豆を挽き、ハンドドリップで。待つ時間も含めて楽しんでください。</p>
      <div class="note">提供まで約6分</div>
    </div>
  </div>
  <div class="brand"><span class="mark"></span>KOMOREBIDO</div>
  <div class="pageno">02</div>
</div>
