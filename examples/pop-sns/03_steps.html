<div class="slide">
  <div class="deco layer-texture"></div>
  <div class="head">
    <div class="kicker">HOW TO START</div>
    <h2>今日からできる、<em>はじめの3ステップ</em></h2>
    <p class="lead">完璧を目指さないのがコツ。まずは「小さく始めて、続ける」ことだけ考えましょう。</p>
  </div>
  <div class="steps" style="--cols: 3;">
    <div class="step">
      <div class="badge">1</div>
      <h3>テーマをひとつ決める</h3>
      <p>「パン作り」「子育てグッズ」など、あなたが3年話せることをひとつだけ。絞るほど届きます。</p>
      <div class="note">所要時間：30分</div>
    </div>
    <div class="step">
      <div class="badge">2</div>
      <h3>週3回、同じ時間に投稿</h3>
      <p>毎日じゃなくてOK。「火・木・土の朝8時」のように決めると、無理なく習慣になります。</p>
      <div class="note">所要時間：1投稿15分</div>
    </div>
    <div class="step">
      <div class="badge">3</div>
      <h3>30日後にふりかえる</h3>
      <p>伸びた投稿のマネを自分でする、が最強の攻略法。数字は「答え合わせ」に使いましょう。</p>
      <div class="note">所要時間：月1回30分</div>
    </div>
  </div>
  <div class="brand"><span class="mark"></span>SNS LAB</div>
  <div class="pageno">03</div>
</div>
